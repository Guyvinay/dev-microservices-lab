spring:
  application:
    name: dev-email-server
server:
  port: 8004
  servlet.context-path: /dev-email-server

################################################################################
# ELASTICSEARCH (Custom index settings)
################################################################################
elastic:
  index:
    private: es_private_message_index
    group: es_group_message_index
    email: email_index_test_1


management:
  server:
    port: 8091   # separate management port (recommended)
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    elasticsearch:
      enabled: true
    rabbit:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

app:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}

    protocol: smtp

    auth: true
    start-tls-enable: true
    start-tls-required: true

    connection-timeout: 5000
    timeout: 5000
    write-timeout: 5000

    pool-enabled: true
    pool-size: 10

    default-encoding: UTF-8

rmq:
  host: localhost
  port: 5672
  username: guest
  password: guest
  addresses: localhost:15672